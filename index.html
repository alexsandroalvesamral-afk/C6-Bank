<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PIX</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont;
    background:radial-gradient(circle at top,#0f172a,#020617);
    color:white;
    overflow:hidden;
}

/* telas */
.screen{
    position:absolute;
    width:100%;
    height:100%;
    transition:0.5s;
}

.hidden{
    transform:translateX(100%);
    opacity:0;
}

/* splash */
.splash{
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    font-weight:600;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(0.9);}
    to{opacity:1; transform:scale(1);}
}

/* header */
.header{
    padding:20px;
    font-size:18px;
    font-weight:600;
}

/* card glass */
.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    margin:15px;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

/* input */
input{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
}

/* botão */
button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    color:white;
    font-weight:600;
    transition:0.2s;
}

button:active{
    transform:scale(0.97);
}

/* notif */
.notif{
    position:fixed;
    top:-120px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(17,24,39,0.9);
    backdrop-filter:blur(10px);
    padding:15px;
    border-radius:15px;
    transition:0.5s;
}

/* footer */
.footer{
    position:fixed;
    bottom:5px;
    width:100%;
    text-align:center;
    font-size:10px;
    opacity:0.3;
}
</style>
</head>

<body>

<div class="notif" id="notif">💸 PIX recebido</div>

<!-- SPLASH -->
<div id="splash" class="screen splash">
PIX
</div>

<!-- HOME -->
<div id="home" class="screen hidden">
<div class="header">Área PIX</div>

<div class="card">
<input id="nome" placeholder="Nome do recebedor">
<input id="valor" placeholder="Valor">
<button onclick="simular()">Simular recebimento</button>
</div>
</div>

<!-- COMPROVANTE -->
<div id="comp" class="screen hidden">
<div class="header">Comprovante</div>

<div class="card" id="print">
<p><b>Destinatário:</b> <span id="c_nome"></span></p>
<p><b>Valor:</b> R$ <span id="c_valor"></span></p>
<p><b>Status:</b> Concluído</p>
<p><b>Data:</b> <span id="data"></span></p>
<p><b>ID:</b> <span id="id"></span></p>
</div>

<button onclick="gerarImagem()">Gerar imagem</button>
<button onclick="compartilhar()">Compartilhar</button>
<button onclick="voltar()">Voltar</button>
</div>

<div class="footer">simulação</div>

<script>

// splash
setTimeout(()=>{
    mudar("splash","home");
},1400);

// som + vibração
function feedback(){
    if(navigator.vibrate) navigator.vibrate(100);

    try{
        let ctx = new (window.AudioContext||window.webkitAudioContext)();
        let osc = ctx.createOscillator();
        osc.connect(ctx.destination);
        osc.start();
        setTimeout(()=>osc.stop(),120);
    }catch(e){}
}

// trocar tela
function mudar(a,b){
    document.getElementById(a).classList.add("hidden");
    document.getElementById(b).classList.remove("hidden");
}

// simular
function simular(){

    let nome = document.getElementById("nome").value;
    let valor = document.getElementById("valor").value;

    if(!nome || !valor){
        alert("Preencha tudo");
        return;
    }

    feedback();

    let agora = new Date();

    document.getElementById("c_nome").innerText = nome;
    document.getElementById("c_valor").innerText = parseFloat(valor).toFixed(2);
    document.getElementById("data").innerText = agora.toLocaleString();
    document.getElementById("id").innerText =
    "E2E"+Math.floor(Math.random()*999999999999);

    let n = document.getElementById("notif");
    n.style.top="20px";
    setTimeout(()=>n.style.top="-120px",2000);

    mudar("home","comp");
}

// gerar imagem
function gerarImagem(){
    html2canvas(document.getElementById("print")).then(canvas=>{
        let link = document.createElement("a");
        link.download = "comprovante.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}

// compartilhar
function compartilhar(){
    if(navigator.share){
        navigator.share({
            title:"Comprovante",
            text:"Simulação"
        });
    }else{
        alert("Use gerar imagem e compartilhe");
    }
}

function voltar(){
    mudar("comp","home");
}

</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>
