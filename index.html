<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PIX</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont;
    background:#050816;
    color:white;
}

/* telas */
.screen{
    position:absolute;
    width:100%;
    height:100%;
    transition:0.4s;
}

.hidden{ transform:translateX(100%); }

/* topo */
.header{
    padding:20px;
    font-size:18px;
    font-weight:600;
}

/* card */
.card{
    background:#0f172a;
    margin:15px;
    padding:20px;
    border-radius:20px;
}

/* inputs */
input{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
}

/* botão */
button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    color:white;
}

/* notif */
.notif{
    position:fixed;
    top:-100px;
    left:50%;
    transform:translateX(-50%);
    background:#111827;
    padding:15px;
    border-radius:15px;
    transition:0.5s;
}

/* histórico */
.history{
    font-size:13px;
    opacity:0.8;
}

/* footer */
.footer{
    position:fixed;
    bottom:5px;
    width:100%;
    text-align:center;
    font-size:10px;
    opacity:0.3;
}
</style>
</head>

<body>

<div class="notif" id="notif">💸 PIX recebido</div>

<!-- HOME -->
<div id="home" class="screen">
<div class="header">Área PIX</div>

<div class="card">
<input id="nome" placeholder="Nome">
<input id="valor" placeholder="Valor">
<button onclick="simular()">Simular</button>
</div>

<div class="card">
<h3>Histórico</h3>
<div id="historico" class="history"></div>
</div>
</div>

<!-- COMPROVANTE -->
<div id="comp" class="screen hidden">
<div class="header">Comprovante</div>

<div class="card" id="areaPrint">
<p><b>Destinatário:</b> <span id="c_nome"></span></p>
<p><b>Valor:</b> R$ <span id="c_valor"></span></p>
<p><b>Status:</b> Concluído</p>
<p><b>Data:</b> <span id="data"></span></p>
<p><b>ID:</b> <span id="id"></span></p>
</div>

<button onclick="baixar()">Gerar imagem</button>
<button onclick="voltar()">Voltar</button>
</div>

<div class="footer">simulação</div>

<script>
let historico = [];

function mudar(a,b){
    document.getElementById(a).classList.add("hidden");
    document.getElementById(b).classList.remove("hidden");
}

function simular(){

    let nome = document.getElementById("nome").value;
    let valor = document.getElementById("valor").value;

    if(!nome || !valor){
        alert("Preencha tudo");
        return;
    }

    let agora = new Date();
    let data = agora.toLocaleString();
    let id = "PIX" + Math.floor(Math.random()*999999999);

    document.getElementById("c_nome").innerText = nome;
    document.getElementById("c_valor").innerText = parseFloat(valor).toFixed(2);
    document.getElementById("data").innerText = data;
    document.getElementById("id").innerText = id;

    historico.push(`${nome} - R$ ${valor}`);
    atualizarHistorico();

    let n = document.getElementById("notif");
    n.style.top="20px";
    setTimeout(()=> n.style.top="-100px",2000);

    mudar("home","comp");
}

function atualizarHistorico(){
    let h = document.getElementById("historico");
    h.innerHTML = historico.map(x=>"<p>"+x+"</p>").join("");
}

function voltar(){
    mudar("comp","home");
}

function baixar(){
    let texto = document.getElementById("areaPrint").innerText;

    let blob = new Blob([texto], {type: "text/plain"});
    let a = document.createElement("a");

    a.href = URL.createObjectURL(blob);
    a.download = "comprovante.txt";
    a.click();
}
</script>

</body>
</html>
