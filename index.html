<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PIX</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont;
    background:#050816;
    color:white;
    overflow:hidden;
}

/* telas */
.screen{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    transition:0.5s;
}

.hidden{
    transform:translateX(100%);
}

/* topo */
.header{
    padding:20px;
    font-size:18px;
    font-weight:600;
}

/* card */
.card{
    background:#0f172a;
    margin:15px;
    padding:20px;
    border-radius:20px;
}

/* inputs */
input{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
}

/* botão */
button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    color:white;
    font-weight:600;
}

/* notif */
.notif{
    position:fixed;
    top:-100px;
    left:50%;
    transform:translateX(-50%);
    background:#111827;
    padding:15px;
    border-radius:15px;
    transition:0.5s;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* comprovante */
.comp{
    font-size:14px;
    line-height:1.8;
}

/* footer discreto */
.footer{
    position:fixed;
    bottom:5px;
    width:100%;
    text-align:center;
    font-size:10px;
    opacity:0.3;
}
</style>
</head>

<body>

<div class="notif" id="notif">💸 PIX recebido</div>

<!-- HOME -->
<div id="home" class="screen">
<div class="header">Área PIX</div>

<div class="card">
<input id="nome" placeholder="Nome do recebedor">
<input id="valor" placeholder="Valor (ex: 2500)">
<button onclick="simular()">Simular recebimento</button>
</div>
</div>

<!-- LOADING -->
<div id="loading" class="screen hidden">
<div class="header">Processando...</div>
</div>

<!-- COMPROVANTE -->
<div id="comp" class="screen hidden">
<div class="header">Comprovante</div>

<div class="card comp">
<p><b>Destinatário:</b> <span id="c_nome"></span></p>
<p><b>Valor:</b> R$ <span id="c_valor"></span></p>
<p><b>Instituição:</b> Banco Digital</p>
<p><b>Status:</b> Concluído</p>
<p><b>Data:</b> <span id="data"></span></p>
<p><b>ID:</b> <span id="id"></span></p>
</div>

<button onclick="voltar()">Voltar</button>
</div>

<div class="footer">simulação</div>

<script>

function vibrar(){
    if(navigator.vibrate){
        navigator.vibrate([200,100,200]);
    }
}

function som(){
    try{
        let ctx = new (window.AudioContext||window.webkitAudioContext)();
        let osc = ctx.createOscillator();
        osc.connect(ctx.destination);
        osc.start();
        setTimeout(()=>osc.stop(),150);
    }catch(e){}
}

function mudar(a,b){
    document.getElementById(a).classList.add("hidden");
    document.getElementById(b).classList.remove("hidden");
}

function simular(){

    let nome = document.getElementById("nome").value;
    let valor = document.getElementById("valor").value;

    if(!nome || !valor){
        alert("Preencha tudo");
        return;
    }

    mudar("home","loading");

    setTimeout(()=>{

        let n = document.getElementById("notif");
        n.style.top="20px";

        vibrar();
        som();

        setTimeout(()=> n.style.top="-100px",2000);

        document.getElementById("c_nome").innerText = nome;
        document.getElementById("c_valor").innerText = parseFloat(valor).toFixed(2);

        let agora = new Date();
        document.getElementById("data").innerText =
        agora.toLocaleDateString()+" "+agora.toLocaleTimeString();

        let id = "E2E" + Math.floor(Math.random()*999999999999);
        document.getElementById("id").innerText = id;

        mudar("loading","comp");

    },1500);
}

function voltar(){
    mudar("comp","home");
}

</script>

</body>
</html>
